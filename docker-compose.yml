services:
  app:
    image: php:8.3-fpm
    container_name: fbf-app
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - db
    networks:
      - fbf-network

  web:
    image: nginx:alpine
    container_name: fbf-web
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - fbf-network

  db:
    image: mysql:8.0
    container_name: fbf-db
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-root}"
      MYSQL_DATABASE: "${DB_DATABASE:-filebase}"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - fbf-network

  node:
    image: node:22-alpine
    container_name: fbf-node
    working_dir: /var/www
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www
    networks:
      - fbf-network

volumes:
  db-data:

networks:
  fbf-network:
    driver: bridge
